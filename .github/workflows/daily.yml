name: Daily News Scraper

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps

      - name: Run BBC scraper
        run: |
          echo "Running BBC scraper..."
          python "DAILY ARTICLES/BBCDAILY.py"

      - name: Run Guardian scraper
        run: |
          echo "Running Guardian scraper..."
          python "DAILY ARTICLES/GUARDIANDAILY.py"

      - name: Run Daily Star scraper
        run: |
          echo "Running Daily Star scraper..."
          python "DAILY ARTICLES/DAILYSTARDAILY.py"

      - name: Run New Age scraper
        run: |
          echo "Running New Age scraper..."
          python "DAILY ARTICLES/NEWAGEDAILY.py"

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Data/
          git commit -m "Daily update" || echo "No changes"
          git push